# FastWAM model config with DINO visual encoder (DiT-side projection)
#
# Uses frozen DINO ViT-L as visual encoder with skip_projection=True:
#   DINO 1024d → DiT patchify Conv3d(1024→3072) directly
# No MLP bottleneck, no SIGReg needed.
#
# Requires a pretrain_checkpoint from pretrain_dino_ditproj to initialise
# the patchify/head layers (which were randomly initialised during pretrain).

_target_: fastwam.runtime.create_fastwam
model_id: Wan-AI/Wan2.2-TI2V-5B
tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
tokenizer_max_len: 128
load_text_encoder: false
proprio_dim: ${data.train.processor.proprio_output_dim}
redirect_common_files: true
mot_checkpoint_mixed_attn: true
action_dit_pretrained_path: /apdcephfs_gy2/share_302533218/shaunxhwang/embodied/world_model/fastwam/checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt

skip_video_dit_load_from_pretrain: false
skip_dit_load_from_pretrain: false

# Load continue-pretrained checkpoint (DiT + visual encoder weights)
# This should point to the output of pretrain_dino_ditproj training
pretrain_checkpoint: null  # e.g., /path/to/pretrain_dino_ditproj/step_50000.pt

# DINO visual encoder with DiT-side projection (no MLP bottleneck)
visual_encoder:
  encoder_type: dino
  model_name: facebook/dinov3-vits16-pretrain-lvd1689m
  skip_projection: true     # Raw 1024d features → DiT patchify directly
  freeze_backbone: true
  spatial_downsample: 16
  temporal_downsample: 4
  standardise_output: false  # fallback to batch standardise if no stats file
  normalise_stats_path: null  # e.g., ./data/dino_vitl_stats.pt (fixed global mean/std)

video_dit_config:
  has_image_input: false
  patch_size: [1, 2, 2]
  in_dim: 384              # DINO ViT-L hidden dim
  hidden_dim: 3072
  ffn_dim: 14336
  freq_dim: 256
  text_dim: 4096
  out_dim: 384             # FM target in DINO space
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  eps: 1.0e-06
  seperated_timestep: true
  require_clip_embedding: false
  require_vae_embedding: false
  fuse_vae_embedding_in_latents: true
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}
  video_attention_mask_mode: "first_frame_causal"
  action_conditioned: false
  action_dim: ${data.train.processor.action_output_dim}
  action_group_causal_mask_mode: "group_diagonal"

action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  ffn_dim: 4096
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  text_dim: 4096
  freq_dim: 256
  eps: 1.0e-06
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

loss:
  lambda_action: 1.0
  action_loss_detach_video_expert: true
