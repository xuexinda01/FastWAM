# Model config: Hierarchical Fast World-Action Model (H-FastWAM)
#
# Three-level architecture with unified vision encoder:
#   1. Language Expert: Task + Subtask reasoning (visual grounding via MoT attention to video)
#   2. Video Expert: DINO Image Latent → Latent World Representation (DiT-side projection)
#   3. Action Expert: World Representation → Action Chunk
#
# No separate image encoder for language — language sees the video expert's
# first-frame tokens through shared MoT self-attention.
#
# Training phases: language_video -> full
# Inference: Language AR-generates subtask (via 2-expert MoT with video)
#            → Video DiT single pass → Action DiT denoises

_target_: fastwam.models.hfastwam.hfastwam.HFastWAM.from_pretrained_fastwam

# FastWAM pretrained checkpoint (fallback for Video Expert)
fastwam_checkpoint: null  # e.g., /path/to/fastwam_ckpt.pt

# Base model
model_id: Wan-AI/Wan2.2-TI2V-5B
tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
tokenizer_max_len: 128
proprio_dim: ${data.train.processor.proprio_output_dim}

# Unified visual encoder (DINO, skip_projection for DiT-side projection)
visual_encoder_config:
  encoder_type: dino
  model_name: facebook/dinov3-vitl16-pretrain-lvd1689m
  skip_projection: true     # Raw 1024d features → DiT patchify directly
  freeze_backbone: true
  spatial_downsample: 16
  temporal_downsample: 4
  standardise_output: true  # per-channel normalise to keep FM target in reasonable range

# Language Expert config (no vision encoder — grounding via MoT attention)
language_vocab_size: 32000
language_max_task_len: 128
language_max_subtask_len: 128

# Training phase: "language_video" or "full"
training_phase: full

# Knowledge insulation: stop gradient from DiT losses to language backbone
knowledge_insulation: true

# Video DiT config (DiT-side projection: in_dim=out_dim=1024)
video_dit_config:
  has_image_input: false
  patch_size: [1, 2, 2]
  in_dim: 1024              # DINO ViT-L hidden dim (DiT-side projection)
  hidden_dim: 3072
  ffn_dim: 14336
  freq_dim: 256
  text_dim: 4096
  out_dim: 1024             # FM target in DINO space
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  eps: 1.0e-06
  seperated_timestep: true
  require_clip_embedding: false
  require_vae_embedding: false
  fuse_vae_embedding_in_latents: true
  use_gradient_checkpointing: true
  video_attention_mask_mode: "first_frame_causal"
  action_conditioned: false
  action_dim: ${data.train.processor.action_output_dim}
  action_group_causal_mask_mode: "group_diagonal"

# Action DiT config
action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  ffn_dim: 4096
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  text_dim: 4096
  freq_dim: 256
  eps: 1.0e-06
  use_gradient_checkpointing: true

action_dit_pretrained_path: null

# Schedulers
video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

# Loss weights (adjust per curriculum phase)
loss_config:
  lambda_language: 1.0
  lambda_video: 1.0
  lambda_action: 1.0
