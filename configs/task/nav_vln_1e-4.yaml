# @package _global_

# dataloading
batch_size: 20
num_workers: 4

model:
  mot_checkpoint_mixed_attn: false

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 10
max_steps: null
log_every: 10
save_every: 100
eval_every: 0

# training
gradient_accumulation_steps: 4
weight_decay: 1e-2
resume: null
