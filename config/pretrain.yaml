# @package _global_

defaults:
  - _self_
  - data: null
  - model: null
  - task: null


output_dir: ./runs/pretrain/${now:%Y-%m-%d}_${now:%H-%M-%S}

# dataloading
batch_size: 2
num_workers: 4

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1.0e-5
num_epochs: 1
max_steps: null
log_every: 10
save_every: 1000
eval_every: 500
eval_num_inference_steps: 10

# training
gradient_accumulation_steps: 1
mixed_precision: "bf16"
seed: 42
max_grad_norm: 1.0
weight_decay: 1e-2
resume: null

# wandb
wandb:
  enabled: false
  workspace: null
  project: wan22-pretrain
  name: pretrain
  group: null
  mode: online

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
